        <div class="divider">────────────────────────────────────────────────────────</div>

        <div id="posts-container"></div>
    </div>

    <script src="blog/blog.js"></script>
    <script>
        (function() {
            var container = document.getElementById('posts-container');
            var html = '';
            POSTS.forEach(function(p) {
                html += '<div class="card blog-card">';
                html += '<div class="blog-date">' + p.date + '</div>';
                if (p.link) {
                    html += '<div class="card-title"><a href="' + p.link + '" target="_blank" style="color:inherit;text-decoration:none;">> ' + p.title + '</a></div>';
                } else {
                    html += '<div class="card-title">> ' + p.title + '</div>';
                }
                html += '<div class="card-desc">' + p.summary + '</div>';
                if (p.tags && p.tags.length > 0) {
                    html += '<div class="card-tags">';
                    p.tags.forEach(function(tag) {
                        html += '<span class="tag">' + tag + '</span>';
                    });
                    html += '</div>';
                }
                html += '</div>';
            });
            container.innerHTML = html;
        })();
    </script>

</body>
